{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
  <title>Connexion</title>
</head>
<body class="index-page" style="background: #f4f9f4;">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5 card shadow p-4 mt-5">
        <div class="text-center mb-4">
            <h2 style="color: #24b7a4;">Connexion</h2>
            <p>Accédez à votre espace Django</p>
        </div>
        
        <form action="login" method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          
          {% for message in messages %}
            <div class="alert alert-danger p-2">{{message}}</div>
          {% endfor %}

          <button type="submit" class="btn w-100" style="background: #24b7a4; color: white;">Se connecter</button>
          <div class="text-center mt-3">
            <a href="register" style="color: #666; font-size: 0.9em;">Pas encore de compte ? S'inscrire</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
